          description: The payload for the request. Anything here should be specified as query parameters (e.g. ?key1=value1&key2=)
          required: false
          schema:
            $ref: '#/components/schemas/iGetClaimPayload'
      security:
        - apiKey: []
      x-internal: false
  /developerApp/{clientId}:
